<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目标检测科研系统 · 研究面板</title>
<!-- 引入提取后的样式表 -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <span class="logo">🔬 目标检测科研系统 · 研究面板</span>
  <span class="badge" id="stage-badge">加载中…</span>

<div id="sidebar">
  <div class="nav-item" data-view="overview">📊 <span>总览</span></div>
  <div class="nav-item" data-view="tasks">✅ <span>任务</span></div>
  <div class="nav-item" data-view="ideas">💡 <span>Ideas</span></div>

<!-- 主内容挂载区 -->
<div id="main"><div class="loading">加载中…</div></div>

<!-- 顺序加载配置文件、核心路由引擎以及视图逻辑子模块 -->
<script src="config.js"></script>
<script src="app.js"></script>
<script src="views/overview.js"></script>
<script src="views/tasks.js"></script>
<script src="views/ideas.js"></script>
